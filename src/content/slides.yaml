# --- Pooja ---
- type: story
  photo: "media/Wedding - Pooja y Roka/Pooja 01.JPG"
  title:
    pt: "Pooja — Oração Sagrada"
    en: "Pooja — Sacred Prayer"
  text:
    pt: |
      A **Pooja** é um dos primeiros rituais pré-casamento, uma cerimônia de oração
      sagrada que invoca as bênçãos divinas para o casal.

      Diante de um altar decorado com flores e oferendas, o sacerdote conduz mantras
      e rituais védicos enquanto a família se reúne em devoção. É um momento de
      profunda espiritualidade que marca o início oficial das celebrações do casamento.
    en: |
      The **Pooja** is one of the first pre-wedding rituals, a sacred prayer ceremony
      that invokes divine blessings for the couple.

      Before an altar decorated with flowers and offerings, the priest chants mantras
      and performs Vedic rituals while the family gathers in devotion. It's a moment of
      deep spirituality that marks the official start of the wedding celebrations.
  layout: "photo-right"
  location: "Family Home, Jaipur"

