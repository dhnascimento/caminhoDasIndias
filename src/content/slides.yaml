- type: story
  photo: "media/Jaipur - Amber Fort/Jaipur - Amber Fort 01.jpg"
  title:
    pt: "Forte Amber"
    en: "Amber Fort"
  text:
    pt: |
      O **Forte Amber** é um majestoso forte-palácio com vista para o Lago Maota,
      uma das joias arquitetônicas do Rajasthan.

      Construído ao longo de quase 100 anos a partir de 1592, o forte combina
      elementos hindus e mogóis em seus palácios, pátios e jardins.
    en: |
      **Amber Fort** is a majestic fort-palace overlooking Maota Lake,
      one of Rajasthan's architectural jewels.

      Built over nearly 100 years starting in 1592, the fort blends
      Hindu and Mughal elements across its palaces, courtyards, and gardens.
  layout: "photo-left"
  location: "Amber Fort, Jaipur"
  fun_fact:
    pt: "O Forte Amber levou quase 100 anos para ser construído, de 1592 até os anos 1600!"
    en: "Amber Fort took nearly 100 years to build, from 1592 to 1600s!"

