  title:
    pt: "Cerimônia do Haldi"
    en: "Haldi Ceremony"
  text:
    pt: |
      A manhã começou com a **cerimônia do Haldi** — um ritual em que pasta de cúrcuma
      é aplicada no noivo e na noiva para bênçãos e boa sorte.

      O que começa como um ritual solene rapidamente se transforma em uma bagunça alegre
      de cúrcuma amarela por todo lado! No final, todos estavam cobertos pela pasta dourada,
      rindo e comemorando juntos.
    en: |
      The morning started with the **Haldi ceremony** — a ritual where turmeric paste
      is applied to the bride and groom for blessings and good luck.

      What starts as a solemn ritual quickly turned into a joyful mess of yellow
      turmeric everywhere! By the end, everyone was covered in the golden paste,
      laughing and celebrating together.
  layout: "photo-left"
  location: "Wedding Venue"
  notes: "Warn people that turmeric stains everything!"

