  location: "Family Home, Jaipur"

# --- Roka ---
- type: story
  photo: "media/Wedding - Pooja y Roka/Roka 01.jpg"
  title:
    pt: "Roka — O Compromisso das Famílias"
    en: "Roka — The Families' Commitment"
  text:
    pt: |
      A **Roka** é a cerimônia que sela oficialmente o compromisso entre as duas famílias.
      Mais do que um noivado, é uma declaração pública de que ambas as famílias aceitam
      e abençoam a união.

      Presentes e doces são trocados entre os parentes, e os mais velhos oferecem
      suas bênçãos ao casal. É um momento carregado de emoção — o primeiro passo
      concreto rumo ao casamento.
    en: |
      The **Roka** is the ceremony that officially seals the commitment between the two families.
      More than an engagement, it's a public declaration that both families accept
      and bless the union.

      Gifts and sweets are exchanged between relatives, and the elders offer
      their blessings to the couple. It's a moment full of emotion — the first concrete
      step toward the wedding.
  layout: "photo-left"
  location: "Family Home, Jaipur"

