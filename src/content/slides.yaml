      preciso a 2 segundos.

      Construído pelo Maharaja Sawai Jai Singh II em 1734 para observações
      astronômicas, os instrumentos monumentais continuam funcionando até hoje.
    en: |
      **Jantar Mantar** houses the world's largest stone sundial —
      accurate to 2 seconds.

      Built by Maharaja Sawai Jai Singh II in 1734 for astronomical
      observations, the monumental instruments still function today.
  layout: "photo-left"
  location: "Jantar Mantar, Jaipur"

