# --- Pre-Wedding Ceremony ---
- type: story
  photo: "photos/pre-wedding-ceremony.jpg"
  title:
    pt: "Cerimônias Pré-Casamento"
    en: "Pre-Wedding Ceremonies"
  text:
    pt: |
      Casamento indiano não é um dia — é uma **experiência de vários dias**!
      Antes da cerimônia principal, uma série de rituais tradicionais prepara o casal
      e as famílias para a grande união.

      Da **Pooja** (oração sagrada) ao **Graha Shanti** (purificação com cúrcuma),
      cada cerimônia tem um propósito espiritual profundo. É a tradição milenar
      guiando cada passo rumo ao casamento.
    en: |
      An Indian wedding isn't just a day — it's a **multi-day experience**!
      Before the main ceremony, a series of traditional rituals prepare the couple
      and families for the grand union.

      From the **Pooja** (sacred prayer) to the **Graha Shanti** (turmeric purification),
      each ceremony carries deep spiritual meaning. It's centuries-old tradition
      guiding every step toward the wedding.
  layout: "photo-right"
  location: "Family Home, Jaipur"

- type: video
  src: "videos/pre-wedding-ceremony.mp4"
  caption:
    pt: "Momentos das cerimônias pré-casamento"
    en: "Pre-wedding ceremony moments"
  poster: "photos/pre-wedding-ceremony-thumb.jpg"

- type: gallery
  title:
