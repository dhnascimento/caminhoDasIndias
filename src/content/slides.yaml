  title:
    pt: "Passeio a Pé pela Manhã"
    en: "Morning Walking Tour"
  text:
    pt: |
      Começamos o dia com um passeio a pé pelo coração da cidade antiga.
      As ruas estreitas fervilhavam de vida enquanto os vendedores montavam suas
      bancas e os moradores seguiam suas rotinas matinais.

      A cada esquina uma nova descoberta — um templo escondido, uma porta colorida,
      ou um rosto amigável ansioso para compartilhar uma história.
    en: |
      We started the day with a walking tour through the heart of the old city.
      The narrow streets buzzed with life as vendors set up their stalls and
      locals went about their morning routines.

      Every corner revealed something new — a hidden temple, a colorful doorway,
      or a friendly face eager to share a story.
  layout: "photo-left"
  location: "Old Jaipur"

