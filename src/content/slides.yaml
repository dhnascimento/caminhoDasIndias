- type: story
  photo: "media/Agra - Taj Mahal/Agra - Taj Mahal 01.jpg"
  title:
    pt: "O Taj Mahal"
    en: "The Taj Mahal"
  text:
    pt: |
      Nenhuma palavra pode verdadeiramente capturar a experiência de ver o **Taj Mahal**
      pela primeira vez.

      Construído pelo Imperador Shah Jahan como um monumento à sua amada esposa Mumtaz Mahal,
      ele se ergue como uma das mais belas expressões de amor já criadas.
      Na suave luz da manhã, o mármore branco parecia brilhar de dentro para fora.
    en: |
      No words can truly capture the experience of seeing the **Taj Mahal**
      for the first time.

      Built by Emperor Shah Jahan as a monument to his beloved wife Mumtaz Mahal,
      it stands as one of the most beautiful expressions of love ever created.
      In the soft morning light, the white marble seemed to glow from within.
  layout: "photo-left"
  location: "Taj Mahal, Agra"
  fun_fact:
    pt: "Levou 22 anos e 20.000 trabalhadores para construir o Taj Mahal!"
    en: "It took 22 years and 20,000 workers to build the Taj Mahal!"

