  title: "Haldi Ceremony"
  text: |
    The morning started with the **Haldi ceremony** — a ritual where turmeric paste
    is applied to the bride and groom for blessings and good luck.

    What starts as a solemn ritual quickly turned into a joyful mess of yellow
    turmeric everywhere! By the end, everyone was covered in the golden paste,
    laughing and celebrating together.
  layout: "photo-left"
  location: "Wedding Venue"
  notes: "Warn people that turmeric stains everything!"

