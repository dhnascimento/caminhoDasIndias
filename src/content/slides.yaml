# ============================================
# CAMINHO DAS ÍNDIAS - Slideshow Content
# ============================================
#
# This is the main content file for your slideshow!
# Edit this file to change slides, add photos, or update captions.
#
# TIP: Your partner can also ask Claude Code for help editing this file.
#      Just describe what you want to change!
#
# ============================================
# BILINGUAL CONTENT
# ============================================
#
# Text fields support two languages (PT-BR and EN).
# Use nested keys to provide both versions:
#
#   title:
#     pt: "Título em Português"
#     en: "Title in English"
#
# You can also use a plain string if no translation is needed:
#
#   title: "Caminho das Índias"
#
# ============================================
# SLIDE TYPES - Quick Reference
# ============================================
#
# type: title      - Opening slide with big title
# type: divider    - Day/section divider with optional background
# type: photo      - Single photo with caption
# type: gallery    - Grid of multiple photos
# type: story      - Photo + text side by side
# type: video      - Video with play button
# type: comparison - Before/after or side-by-side photos
# type: closing    - Ending slide with message
#
# See EDITING-GUIDE.md for detailed examples!
# ============================================

# ============================================
# YOUTUBE PLAYLIST
# ============================================
# Configure a YouTube playlist that plays continuously during the presentation.
# Tracks are synced to slide ranges — when you navigate to a slide in a different
# range, the player automatically skips to the corresponding track.
#
# To use: create a YouTube playlist, paste the ID or URL below, then map each
# track (in playlist order) to a range of slides [start, end] (0-indexed).
#
# Example:
# playlist:
#   youtube: "PLrAXtmErZgOeiKm4sgNOknGvNjby9efdf"
#   tracks:
#     - slides: [0, 5]     # Track 1 plays during slides 0–5
#     - slides: [6, 12]    # Track 2 plays during slides 6–12
#     - slides: [13, 20]   # Track 3 plays during slides 13–20

playlist:
  youtube: "PL_MTJhXNL63MGJ3TV-w-JtVDX1ZPBwwwY"
  tracks:
    - slides: [2, 7]       # Track 1: Day 1 — Arrival & Welcome
    - slides: [8, 13]      # Track 2: Day 2 — Albert Hall Museum
    - slides: [14, 19]     # Track 3: Day 2 — Pre-Wedding Ceremonies
    - slides: [20, 31]     # Track 4: Day 3 — Jaipur sights (walking tour → Govind Devji)
    - slides: [32, 50]     # Track 5: Day 3 — Amber Fort, Jantar Mantar, Jal Mahal
    - slides: [51, 62]     # Track 6: Day 4 — Wedding Venue (Pooja, Roka, Mehendi)
    - slides: [63, 69]     # Track 7: Day 5 — Haldi & Sangeet stories
    - slides: [70, 75]     # Track 8: Day 5 — Sangeet performances & dance floor
    - slides: [76, 84]     # Track 9: Day 6 — Maayra & Baraat
    - slides: [85, 93]     # Track 10: Day 6 — Ceremony, Reception & Day 7
    - slides: [94, 99]     # Track 11: Day 8 — Taj Mahal
    - slides: [100, 108]   # Track 12: Day 8 — Agra Fort
    - slides: [109, 115]   # Track 13: Day 8 — Baby Taj
    - slides: [116, 123]   # Track 14: Day 9 — Fatehpur Sikri & Closing

