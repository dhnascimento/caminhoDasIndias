- type: story
  photo: "media/Wedding - Mehendi/Wedding - Mehendi 01.jpg"
  title:
    pt: "Noite do Mehendi"
    en: "Mehendi Night"
  text:
    pt: |
      Ao cair do sol, a **cerimônia do Mehendi** começou — uma das tradições
      mais belas dos casamentos indianos.

      Artistas habilidosos pintaram designs intrincados de hena nas mãos e pés,
      cada padrão contando uma história de amor e bênçãos. A noite foi repleta
      de música, risadas e o suave perfume da hena.
    en: |
      As the sun set, the **Mehendi ceremony** began — one of the most beautiful
      traditions of Indian weddings.

      Skilled artists painted intricate henna designs on hands and feet,
      each pattern telling a story of love and blessings. The evening was filled
      with music, laughter, and the sweet scent of henna.
  layout: "photo-right"
  location: "Wedding Venue"

