# ============================================
# DAY 8 - FEBRUARY 22, 2026
# Agra: Taj Mahal & More
# ============================================
- type: divider
  day: 8
  title: "Agra"
  date: "February 22, 2026"
  subtitle: "The city of the Taj"
  photo: "photos/agra-divider.jpg"

- type: story
  photo: "photos/taj-mahal-sunrise.jpg"
  title: "The Taj Mahal"
  text: |
    No words can truly capture the experience of seeing the **Taj Mahal**
    for the first time.

    Built by Emperor Shah Jahan as a monument to his beloved wife Mumtaz Mahal,
    it stands as one of the most beautiful expressions of love ever created.
    In the soft morning light, the white marble seemed to glow from within.
  layout: "photo-left"
  location: "Taj Mahal, Agra"
  fun_fact: "It took 22 years and 20,000 workers to build the Taj Mahal!"

- type: gallery
  title: "Taj Mahal"
  photos:
    - src: "photos/taj-1.jpg"
      caption: "The iconic view"
    - src: "photos/taj-2.jpg"
      caption: "Intricate marble inlay"
    - src: "photos/taj-3.jpg"
      caption: "Reflecting pool"
    - src: "photos/taj-4.jpg"
      caption: "Details up close"
  caption: "A monument to eternal love"
  location: "Taj Mahal, Agra"

- type: photo
  photo: "photos/agra-fort.jpg"
  caption: "Agra Fort"
  subcaption: "A UNESCO World Heritage Site with views of the Taj"
  location: "Agra Fort"
  fun_fact: "Shah Jahan spent his final years imprisoned here, gazing at his wife's tomb"

- type: story
  photo: "photos/baby-taj.jpg"
  title: "Baby Taj"
  text: |
    The **Itimad-ud-Daulah**, often called the "Baby Taj," is sometimes
    overlooked by visitors, but it's a gem in its own right.

    This delicate tomb was actually a predecessor to the Taj Mahal,
    and many of the same design elements can be seen here — including
    the beautiful pietra dura (marble inlay) work.
  layout: "photo-right"
  location: "Itimad-ud-Daulah, Agra"

- type: gallery
  title: "Evening with Friends"
