  text:
    pt: |
      O **Hawa Mahal** possui 953 janelas pequenas projetadas para que as mulheres reais
      observassem a rua sem serem vistas.

      Construído em 1799 pelo Maharaja Sawai Pratap Singh, tem o formato
      da coroa do Senhor Krishna.
    en: |
      **Hawa Mahal** features 953 small windows designed to let royal women
      observe street life unseen.

      Built in 1799 by Maharaja Sawai Pratap Singh, it's shaped like
      Lord Krishna's crown.
