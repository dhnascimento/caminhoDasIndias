  title:
    pt: "Noite do Sangeet"
    en: "Sangeet Night"
  text:
    pt: |
      O **Sangeet** é a noite de música e dança que antecede o casamento —
      e uma das celebrações mais esperadas.

      As duas famílias sobem ao palco para apresentações preparadas com semanas
      de antecedência, de danças folclóricas tradicionais a coreografias de Bollywood.
    en: |
      The **Sangeet** is the pre-wedding night of music and dance —
      and one of the most anticipated celebrations.

      Both families take the stage with performances rehearsed weeks in advance,
      from traditional folk dances to Bollywood choreographies.
  layout: "photo-right"
  location: "Wedding Venue"

- type: story
  photo: "media/Wedding - Sangeet/Wedding - Sangeet 02.JPG"
  title:
    pt: "A Competição Amistosa"
    en: "The Friendly Competition"
  text:
    pt: |
      A rivalidade entre as famílias do noivo e da noiva é parte da diversão.
      Cada lado tenta superar o outro com apresentações cada vez mais elaboradas.

      Entre uma performance e outra, risadas, aplausos e muita energia
      sob um céu de luzes.
    en: |
      The rivalry between the groom's and bride's families is part of the fun.
      Each side tries to outdo the other with increasingly elaborate performances.

      Between acts, there's laughter, applause, and boundless energy
      under a canopy of lights.
  layout: "photo-left"
  location: "Wedding Venue"

- type: story
  photo: "media/Wedding - Sangeet/Wedding - Sangeet 03.JPG"
  title:
    pt: "Todos na Pista"
    en: "Everyone on the Floor"
  text:
    pt: |
      Quando as apresentações terminam, a pista se abre para todos.
      Convidados de todas as idades se juntam — não importa se você
      sabe dançar ou não, o ritmo leva todo mundo.

      É impossível ficar parado quando a música toca.
    en: |
      When the performances end, the floor opens up to everyone.
      Guests of all ages join in — it doesn't matter if you know
      how to dance, the rhythm carries you.

      It's impossible to stand still when the music plays.
  layout: "photo-right"
  location: "Wedding Venue"

