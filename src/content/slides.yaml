- type: story
  photo: "media/Jaipur - Albert Hall Museum/Jaipur - Albert Hall Museum 01.jpg"
  title:
    pt: "Museu Albert Hall"
    en: "Albert Hall Museum"
  text:
    pt: |
      O **Museu Albert Hall** é um dos museus mais antigos do Rajasthan,
      instalado em um deslumbrante edifício indo-sarraceno.

      Passamos a manhã explorando sua incrível coleção de artefatos,
      esculturas e pinturas que contam a história da rica herança do Rajasthan.
    en: |
      The **Albert Hall Museum** is one of the oldest museums in Rajasthan,
      housed in a stunning Indo-Saracenic building.

      We spent the morning exploring its incredible collection of artifacts,
      sculptures, and paintings that tell the story of Rajasthan's rich history.
  layout: "photo-right"
  location: "Albert Hall Museum, Jaipur"
  fun_fact:
    pt: "O Albert Hall foi projetado por Sir Samuel Swinton Jacob e inaugurado em 1887!"
    en: "Albert Hall was designed by Sir Samuel Swinton Jacob and opened in 1887!"

