# --- Shoe Stealing ---
- type: story
  title:
    pt: "O Roubo do Sapato"
    en: "The Shoe Stealing"
  text:
    pt: |
      Fique de olho nas damas de honra e na família da noiva durante a cerimônia
      — é aí que a travessura começa. **Elas realmente roubam os sapatos do noivo!**

      Depois, exigem dinheiro para devolvê-los. Tudo gira em torno da negociação.
      Às vezes também tentam impedir os noivos de saírem da cerimônia:
      "Pague e leve a noiva com você!"

      É uma tradição divertida que arranca risadas de todos os convidados.
    en: |
      Keep your eyes on the bridesmaids and the bride's side of the family during
      the ceremony — that's where the mischief begins. **They do steal the groom's shoes!**

      Then they'll demand money, and he'll have to pay up to get them back.
      Everything is about the negotiation. They'll also try to stop the bride
      and groom from leaving the ceremony: "Pay us, and you get to take
      the bride with you!"

      It's a lighthearted tradition that gets everyone laughing.
  layout: "photo-right"
  location: "Wedding Venue, Jaipur"

- type: story
  photo: "media/Wedding - Reception/Wedding - Reception 01.JPG"
  title:
    pt: "A Grande Recepção"
    en: "The Grand Reception"
  text:
    pt: |
      Ao cair da noite, a **recepção** começou — uma celebração glamorosa
      dando as boas-vindas aos recém-casados como um casal.

      Centenas de convidados se reuniram para jantar, dançar e parabenizar
      em um salão de banquetes lindamente decorado.
    en: |
      As evening fell, the **reception** began — a glamorous celebration
      welcoming the newlyweds as a married couple.

      Hundreds of guests gathered for dinner, dancing, and congratulations
      in a beautifully decorated banquet hall.
  layout: "photo-left"
  location: "Wedding Venue"

- type: gallery
  title:
    pt: "Destaques da Recepção"
    en: "Reception Highlights"
  photos:
