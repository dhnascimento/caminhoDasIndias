    - src: "media/Wedding - Reception/Wedding - Reception 03.jpg"
    - src: "media/Wedding - Reception/Wedding - Reception 04.jpg"
  caption:
    pt: "Celebrando até a madrugada"
    en: "Celebrating into the night"
  location: "Wedding Venue"

