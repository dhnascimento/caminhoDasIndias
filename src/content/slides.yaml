- type: story
  photo: "photos/fatehpur-sikri.jpg"
  title: "Fatehpur Sikri"
  text:
    pt: |
      Em nossa última manhã, visitamos **Fatehpur Sikri** — a capital mogol abandonada
      que parece congelada no tempo.

      Construída pelo Imperador Akbar no século XVI, essa "Cidade da Vitória"
      foi misteriosamente abandonada apenas 14 anos após sua conclusão.
      Caminhar por seus palácios e pátios vazios foi assombrosamente belo.
    en: |
      On our final morning, we visited **Fatehpur Sikri** — the abandoned
      Mughal capital that feels frozen in time.

      Built by Emperor Akbar in the 16th century, this "City of Victory"
      was mysteriously abandoned just 14 years after completion.
      Walking through its empty palaces and courtyards was hauntingly beautiful.
  layout: "photo-left"
  location: "Fatehpur Sikri"
  fun_fact:
    pt: "A cidade foi abandonada por falta de água — um problema ainda estudado hoje"
    en: "The city was abandoned due to lack of water — a problem still being studied today"

