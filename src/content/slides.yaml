    en: "Local School Visit"
  text:
    pt: |
      Uma das partes mais memoráveis do dia foi uma visita improvisada a uma escola pública local.
      A curiosidade e o entusiasmo das crianças eram contagiantes, e passamos um tempo
      aprendendo sobre seus estudos e trocando histórias.

      *Um lembrete de por que viajar é tão significativo.*
    en: |
      One of the most memorable parts of the day was an impromptu visit to a local public school.
      The children's curiosity and enthusiasm were infectious, and we spent time
      learning about their studies and sharing stories.

      *A reminder of why travel is so meaningful.*
