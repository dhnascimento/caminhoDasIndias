- type: story
  photo: "photos/baby-taj.jpg"
  title: "Baby Taj"
  text:
    pt: |
      O **Itimad-ud-Daulah**, frequentemente chamado de "Baby Taj", é por vezes
      ignorado pelos visitantes, mas é uma joia por direito próprio.

      Este delicado mausoléu foi na verdade um precursor do Taj Mahal,
      e muitos dos mesmos elementos de design podem ser vistos aqui — incluindo
      o belo trabalho de pietra dura (incrustação de mármore).
    en: |
      The **Itimad-ud-Daulah**, often called the "Baby Taj," is sometimes
      overlooked by visitors, but it's a gem in its own right.

      This delicate tomb was actually a predecessor to the Taj Mahal,
      and many of the same design elements can be seen here — including
      the beautiful pietra dura (marble inlay) work.
  layout: "photo-right"
  location: "Itimad-ud-Daulah, Agra"

