  notes: "Share any specific interactions or moments that stood out"

- type: story
  photo: "media/Jaipur - Govind Devji Temple/Jaipur - Govind Devji Temple 01.jpg"
  title:
    pt: "Templo Govind Devji"
    en: "Govind Devji Temple"
  text:
    pt: |
      O **Templo Govind Devji** fica no coração do complexo do Palácio da Cidade,
      dedicado ao Senhor Krishna na forma de Govind Dev.

      Construído no século XVIII pelo Maharaja Sawai Jai Singh II, o templo é um dos
      locais de culto mais importantes de Jaipur. Milhares de devotos se reúnem diariamente
      sob seus tetos ricamente decorados para participar das orações e cerimônias.
    en: |
      The **Govind Devji Temple** sits at the heart of the City Palace complex,
      dedicated to Lord Krishna in the form of Govind Dev.

      Built in the 18th century by Maharaja Sawai Jai Singh II, the temple is one of
      Jaipur's most important places of worship. Thousands of devotees gather daily
      beneath its richly decorated ceilings to join in prayers and ceremonies.
  layout: "photo-left"
  location: "City Palace Complex, Jaipur"

